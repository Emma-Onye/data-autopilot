<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Vantage — Interactive Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pulse-ring {
      0% { transform: scale(0.9); opacity: 0.6; }
      70% { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 1.8s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .spin-slow { animation: spin-slow 3s linear infinite; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.4s ease-out both; }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slide-in 0.35s ease-out both; }
    @keyframes bar-grow { from { width: 0%; } }
    .bar-grow { animation: bar-grow 1.2s ease-out both; }
    @keyframes count-up { from { opacity: 0; } to { opacity: 1; } }
    .count-up { animation: count-up 0.6s ease-out both; }
    .phone-shadow { box-shadow: 0 30px 60px -20px rgba(16,24,40,0.35), 0 18px 36px -18px rgba(16,24,40,0.25); }
    .bg-grid {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(16,185,129,0.12) 1px, transparent 0);
      background-size: 22px 22px;
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ---------- MOCK DATA (Nigerian context) ----------
    const APPS = [
      { id: "tiktok",    name: "TikTok",      icon: "🎵", color: "bg-rose-500",    bg: 420, fg: 180, priority: "low" },
      { id: "instagram", name: "Instagram",   icon: "📸", color: "bg-pink-500",    bg: 310, fg: 220, priority: "medium" },
      { id: "youtube",   name: "YouTube",     icon: "▶️", color: "bg-red-600",     bg: 250, fg: 600, priority: "medium" },
      { id: "whatsapp",  name: "WhatsApp",    icon: "💬", color: "bg-emerald-500", bg: 40,  fg: 120, priority: "high"   },
      { id: "chrome",    name: "Chrome",      icon: "🌐", color: "bg-sky-500",     bg: 150, fg: 260, priority: "medium" },
      { id: "facebook",  name: "Facebook",    icon: "👥", color: "bg-blue-600",    bg: 180, fg: 100, priority: "low"    },
      { id: "xapp",      name: "X (Twitter)", icon: "𝕏",  color: "bg-slate-800",   bg: 90,  fg: 110, priority: "low"    },
      { id: "playstore", name: "Play Store",  icon: "📦", color: "bg-amber-500",   bg: 380, fg: 10,  priority: "low"    },
    ];

    const WEEK = [
      { day: "Mon", used: 820, saved: 180 },
      { day: "Tue", used: 740, saved: 260 },
      { day: "Wed", used: 690, saved: 310 },
      { day: "Thu", used: 580, saved: 420 },
      { day: "Fri", used: 520, saved: 480 },
      { day: "Sat", used: 610, saved: 390 },
      { day: "Sun", used: 470, saved: 530 },
    ];

    // ---------- SMALL UI HELPERS ----------
    const fmtMB = (mb) => mb >= 1000 ? `${(mb/1000).toFixed(2)} GB` : `${mb} MB`;
    const naira = (n) => `₦${n.toLocaleString("en-NG")}`;

    const Icon = ({ children, className = "" }) => (
      <span className={`inline-flex items-center justify-center ${className}`}>{children}</span>
    );

    const AppAvatar = ({ app, size = 11 }) => (
      <div className={`w-${size} h-${size} rounded-2xl ${app.color} text-white flex items-center justify-center text-lg font-semibold shadow-sm flex-shrink-0`}>
        {app.icon}
      </div>
    );

    // ---------- PHONE SHELL ----------
    const PhoneShell = ({ children, theme = "light" }) => {
      const [time, setTime] = useState("");
      useEffect(() => {
        const update = () => {
          const d = new Date();
          setTime(d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: false }));
        };
        update();
        const t = setInterval(update, 10000);
        return () => clearInterval(t);
      }, []);

      const statusColor = theme === "dark" ? "text-white" : "text-slate-900";

      return (
        <div className="relative w-[380px] h-[780px] bg-black rounded-[44px] p-[10px] phone-shadow">
          <div className="relative w-full h-full rounded-[36px] overflow-hidden bg-white">
            {/* Status bar */}
            <div className={`absolute top-0 left-0 right-0 flex items-center justify-between px-7 pt-3 pb-1 text-xs font-semibold z-40 ${statusColor}`}>
              <span>{time}</span>
              <span className="flex items-center gap-1">
                <span>●●●●</span>
                <span>MTN</span>
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><rect x="0" y="3" width="2" height="4" fill="currentColor"/><rect x="3" y="2" width="2" height="6" fill="currentColor"/><rect x="6" y="1" width="2" height="8" fill="currentColor"/><rect x="9" y="0" width="2" height="10" fill="currentColor"/></svg>
                <svg width="18" height="10" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2" stroke="currentColor" strokeWidth="1.2"/><rect x="3" y="3" width="15" height="6" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
              </span>
            </div>
            {/* Notch */}
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-6 bg-black rounded-b-2xl z-50"></div>
            {/* Content */}
            <div className="w-full h-full overflow-hidden">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // ---------- ROUTER STATE ----------
    const SCREENS = [
      "welcome", "permissions", "scanning", "wow", "fix", "fixSuccess",
      "dashboard", "insights", "weekly", "modes", "share"
    ];

    // ---------- WELCOME ----------
    const WelcomeScreen = ({ go }) => (
      <div className="w-full h-full bg-gradient-to-br from-emerald-500 via-emerald-600 to-teal-700 text-white flex flex-col relative overflow-hidden">
        <div className="absolute inset-0 bg-grid opacity-30"></div>
        <div className="relative flex-1 flex flex-col items-center justify-center px-8 text-center">
          <div className="relative mb-6">
            <div className="absolute inset-0 rounded-3xl bg-white/20 pulse-ring"></div>
            <div className="relative w-20 h-20 rounded-3xl bg-white text-emerald-600 flex items-center justify-center text-4xl font-black shadow-2xl">
              DV
            </div>
          </div>
          <h1 className="text-3xl font-extrabold tracking-tight mb-3">Data Vantage</h1>
          <p className="text-lg font-medium text-emerald-50/95 mb-2">
            Stop data waste.
          </p>
          <p className="text-xl font-bold text-white mb-6">
            Make your data last 2× longer.
          </p>
          <div className="bg-white/15 backdrop-blur-sm rounded-2xl p-4 w-full max-w-[280px] border border-white/20">
            <div className="flex items-center gap-3 mb-3">
              <div className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">🇳🇬</div>
              <div className="text-sm text-left leading-tight">
                <div className="font-semibold">Built for Nigeria</div>
                <div className="text-emerald-100/90 text-xs">Save up to ₦5,000/month</div>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">⚡</div>
              <div className="text-sm text-left leading-tight">
                <div className="font-semibold">Works automatically</div>
                <div className="text-emerald-100/90 text-xs">No settings headache</div>
              </div>
            </div>
          </div>
        </div>
        <div className="relative px-6 pb-8">
          <button
            onClick={() => go("permissions")}
            className="w-full bg-white text-emerald-700 font-bold py-4 rounded-2xl text-lg active:scale-95 transition shadow-xl">
            Start saving data →
          </button>
          <p className="text-center text-xs text-emerald-100/80 mt-3">
            Free to start • No credit card needed
          </p>
        </div>
      </div>
    );

    // ---------- PERMISSIONS ----------
    const PermissionsScreen = ({ go }) => {
      const [granted, setGranted] = useState({ usage: false, data: false });
      const allGranted = granted.usage && granted.data;

      return (
        <div className="w-full h-full bg-white flex flex-col pt-10">
          <div className="px-6 pt-8">
            <div className="text-5xl mb-4">🔒</div>
            <h2 className="text-2xl font-extrabold text-slate-900 leading-tight mb-2">
              We need your permission
            </h2>
            <p className="text-slate-600 text-base leading-relaxed">
              So we can see which apps are draining your data — and stop them for you.
            </p>
          </div>

          <div className="flex-1 px-6 mt-6 space-y-3">
            <PermissionCard
              icon="📊"
              title="See app data usage"
              body="To show you exactly which apps are eating your MB."
              granted={granted.usage}
              onGrant={() => setGranted(g => ({ ...g, usage: true }))}
            />
            <PermissionCard
              icon="🚦"
              title="Control background data"
              body="To stop apps silently burning your data while you sleep."
              granted={granted.data}
              onGrant={() => setGranted(g => ({ ...g, data: true }))}
            />
            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 mt-4">
              <div className="flex items-start gap-3">
                <span className="text-xl">🛡️</span>
                <div className="text-sm text-emerald-900 leading-snug">
                  <b>We never read your content.</b> Not your chats, photos, or videos. We only see how much — never what.
                </div>
              </div>
            </div>
          </div>

          <div className="px-6 pb-8">
            <button
              disabled={!allGranted}
              onClick={() => go("scanning")}
              className={`w-full font-bold py-4 rounded-2xl text-lg transition shadow-lg ${
                allGranted
                  ? "bg-emerald-600 text-white active:scale-95"
                  : "bg-slate-200 text-slate-400"
              }`}>
              {allGranted ? "Continue →" : "Grant both to continue"}
            </button>
          </div>
        </div>
      );
    };

    const PermissionCard = ({ icon, title, body, granted, onGrant }) => (
      <div className={`rounded-2xl p-4 border-2 transition ${granted ? "bg-emerald-50 border-emerald-300" : "bg-white border-slate-200"}`}>
        <div className="flex items-start gap-3">
          <div className="text-2xl">{icon}</div>
          <div className="flex-1">
            <div className="font-bold text-slate-900">{title}</div>
            <div className="text-sm text-slate-600 leading-snug mt-0.5">{body}</div>
          </div>
        </div>
        <button
          onClick={onGrant}
          disabled={granted}
          className={`mt-3 w-full py-2.5 rounded-xl font-semibold text-sm transition ${
            granted
              ? "bg-emerald-600 text-white"
              : "bg-slate-900 text-white active:scale-95"
          }`}>
          {granted ? "✓ Granted" : "Allow"}
        </button>
      </div>
    );

    // ---------- SCANNING ----------
    const ScanningScreen = ({ go }) => {
      const [progress, setProgress] = useState(0);
      const [status, setStatus] = useState("Checking installed apps…");

      useEffect(() => {
        const messages = [
          "Checking installed apps…",
          "Reading 7-day usage history…",
          "Finding background data drains…",
          "Spotting waste patterns…",
          "Almost done…",
        ];
        let i = 0;
        const interval = setInterval(() => {
          setProgress(p => {
            const np = Math.min(100, p + 3);
            const mi = Math.floor((np / 100) * messages.length);
            setStatus(messages[Math.min(mi, messages.length - 1)]);
            if (np >= 100) { clearInterval(interval); setTimeout(() => go("wow"), 500); }
            return np;
          });
        }, 90);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="w-full h-full bg-gradient-to-br from-slate-900 via-emerald-900 to-emerald-800 text-white flex flex-col items-center justify-center p-8 pt-16">
          <div className="relative mb-8">
            <div className="absolute inset-0 rounded-full bg-emerald-400/30 pulse-ring"></div>
            <div className="relative w-32 h-32 rounded-full bg-white/10 border border-emerald-300/30 flex items-center justify-center">
              <svg className="spin-slow" width="70" height="70" viewBox="0 0 70 70" fill="none">
                <circle cx="35" cy="35" r="30" stroke="rgba(255,255,255,0.2)" strokeWidth="3"/>
                <circle cx="35" cy="35" r="30" stroke="#10ffc9" strokeWidth="3" strokeDasharray="188" strokeDashoffset="140" strokeLinecap="round"/>
              </svg>
              <div className="absolute text-4xl">📡</div>
            </div>
          </div>
          <h2 className="text-2xl font-extrabold mb-2">Analyzing your data usage</h2>
          <p className="text-emerald-100/80 text-sm mb-8">{status}</p>
          <div className="w-full max-w-xs bg-white/15 rounded-full h-2 overflow-hidden">
            <div className="h-full bg-emerald-400 rounded-full transition-all duration-200" style={{ width: `${progress}%` }}></div>
          </div>
          <div className="mt-3 text-xs text-emerald-100/70 font-semibold">{progress}%</div>
        </div>
      );
    };

    // ---------- WOW MOMENT ----------
    const WowScreen = ({ go }) => {
      const topWaste = APPS
        .filter(a => a.priority !== "high")
        .sort((a,b) => b.bg - a.bg)
        .slice(0, 3);
      const totalWaste = topWaste.reduce((s,a)=>s+a.bg, 0);
      const estSaveNgn = Math.round(totalWaste * 1.2); // ₦1.2 per MB approx

      return (
        <div className="w-full h-full bg-white flex flex-col pt-10">
          <div className="px-6 pt-8 pb-2">
            <div className="inline-flex items-center gap-1.5 bg-rose-100 text-rose-700 px-3 py-1 rounded-full text-xs font-bold mb-3 fade-up">
              <span className="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
              SCAN COMPLETE
            </div>
            <h2 className="text-[26px] font-black text-slate-900 leading-tight fade-up" style={{animationDelay:"0.05s"}}>
              3 apps are <span className="text-rose-600">wasting</span><br/>your data right now.
            </h2>
            <p className="text-slate-500 text-sm mt-2 fade-up" style={{animationDelay:"0.1s"}}>
              These apps ate data in the background — while you weren't even using them.
            </p>
          </div>

          <div className="flex-1 px-6 mt-4 space-y-2.5 overflow-y-auto no-scrollbar">
            {topWaste.map((app, i) => (
              <div key={app.id} className="fade-up bg-slate-50 rounded-2xl p-3 border border-slate-200" style={{animationDelay: `${0.15 + i*0.08}s`}}>
                <div className="flex items-center gap-3">
                  <AppAvatar app={app} />
                  <div className="flex-1">
                    <div className="font-bold text-slate-900">{app.name}</div>
                    <div className="text-xs text-slate-500">Background use • yesterday</div>
                  </div>
                  <div className="text-right">
                    <div className="font-black text-rose-600">{app.bg} MB</div>
                    <div className="text-[10px] text-slate-500">= {naira(Math.round(app.bg*1.2))}</div>
                  </div>
                </div>
                <div className="mt-2 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-rose-500 to-rose-400 rounded-full bar-grow" style={{ width: `${(app.bg / 450) * 100}%`, animationDelay: `${0.2 + i*0.08}s` }}></div>
                </div>
              </div>
            ))}

            <div className="mt-4 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-5 shadow-lg fade-up" style={{animationDelay: "0.5s"}}>
              <div className="text-xs font-bold uppercase tracking-wider text-emerald-100/90">You could save</div>
              <div className="flex items-baseline gap-2 mt-1">
                <div className="text-4xl font-black count-up">{fmtMB(totalWaste)}</div>
                <div className="text-base font-semibold opacity-90">this week</div>
              </div>
              <div className="text-emerald-50/95 text-sm mt-1">
                ≈ <b>{naira(estSaveNgn)}</b> back in your pocket 💸
              </div>
            </div>
          </div>

          <div className="px-6 pb-8 pt-3">
            <button
              onClick={() => go("fix")}
              className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl text-lg active:scale-95 transition shadow-xl">
              Fix this now →
            </button>
          </div>
        </div>
      );
    };

    // ---------- FIX FLOW ----------
    const FixScreen = ({ go }) => {
      const steps = [
        { app: "tiktok",    label: "Restrict TikTok background",    saved: 420 },
        { app: "instagram", label: "Restrict Instagram background", saved: 310 },
        { app: "playstore", label: "Pause Play Store auto-updates", saved: 380 },
      ];
      const [idx, setIdx] = useState(0);
      const [applying, setApplying] = useState(false);
      const current = steps[idx];
      const currentApp = APPS.find(a => a.id === current.app);
      const totalSaved = steps.slice(0, idx).reduce((s,x)=>s+x.saved, 0);

      const apply = () => {
        setApplying(true);
        setTimeout(() => {
          if (idx < steps.length - 1) {
            setIdx(i => i + 1);
            setApplying(false);
          } else {
            go("fixSuccess");
          }
        }, 1100);
      };

      return (
        <div className="w-full h-full bg-white flex flex-col pt-10">
          <div className="px-6 pt-6 pb-3 flex items-center justify-between">
            <button onClick={() => go("wow")} className="text-slate-500 font-semibold text-sm">← Back</button>
            <div className="text-xs text-slate-500">Step {idx+1} of {steps.length}</div>
          </div>

          <div className="px-6">
            <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${((idx) / steps.length) * 100}%` }}></div>
            </div>
          </div>

          <div className="flex-1 px-6 pt-8 flex flex-col items-center text-center">
            <div className="relative">
              <div className={`w-24 h-24 rounded-3xl ${currentApp.color} text-white flex items-center justify-center text-4xl shadow-xl transition ${applying ? "scale-110" : ""}`}>
                {currentApp.icon}
              </div>
              {applying && <div className="absolute inset-0 rounded-3xl bg-emerald-400/50 pulse-ring"></div>}
            </div>

            <h2 className="text-2xl font-extrabold text-slate-900 mt-6">{current.label}</h2>
            <p className="text-slate-500 text-sm mt-2 max-w-xs">
              {applying ? "Applying restriction…" : `This stops ${currentApp.name} from using data while you're not in it.`}
            </p>

            <div className="mt-6 bg-emerald-50 border border-emerald-200 rounded-2xl px-5 py-3">
              <div className="text-xs text-emerald-700 font-semibold">Will save</div>
              <div className="text-3xl font-black text-emerald-700">{fmtMB(current.saved)}</div>
            </div>
          </div>

          <div className="px-6 pb-8 space-y-2">
            <button
              disabled={applying}
              onClick={apply}
              className={`w-full font-bold py-4 rounded-2xl text-lg transition shadow-xl ${
                applying
                  ? "bg-slate-300 text-slate-500"
                  : "bg-emerald-600 text-white active:scale-95"
              }`}>
              {applying ? "Applying…" : `Restrict ${currentApp.name}`}
            </button>
            <button
              disabled={applying}
              onClick={() => idx < steps.length-1 ? setIdx(i => i+1) : go("fixSuccess")}
              className="w-full text-slate-500 font-semibold py-2">
              Skip this one
            </button>
          </div>
        </div>
      );
    };

    const FixSuccessScreen = ({ go }) => (
      <div className="w-full h-full bg-gradient-to-br from-emerald-500 to-teal-700 text-white flex flex-col items-center justify-center px-8 pt-10 relative overflow-hidden">
        <div className="absolute inset-0 bg-grid opacity-25"></div>
        <div className="relative">
          <div className="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center mx-auto mb-6 border-4 border-white/30 backdrop-blur-sm">
            <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
              <path d="M14 25l8 8 16-16" stroke="white" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <h2 className="text-3xl font-black text-center">Done!</h2>
          <p className="text-center text-emerald-50 mt-2">Your data is now protected.</p>

          <div className="mt-8 bg-white/15 backdrop-blur-sm rounded-3xl p-6 border border-white/20 w-[280px]">
            <div className="text-sm text-emerald-100/90 font-semibold text-center">We just saved you</div>
            <div className="text-5xl font-black text-center my-2">1.11 GB</div>
            <div className="text-center text-emerald-50">≈ <b>{naira(1332)}</b> this week</div>
            <div className="h-px bg-white/20 my-4"></div>
            <div className="grid grid-cols-3 text-center text-xs">
              <div><div className="font-bold text-lg">3</div><div className="text-emerald-100/80">Apps fixed</div></div>
              <div><div className="font-bold text-lg">4</div><div className="text-emerald-100/80">Days extra</div></div>
              <div><div className="font-bold text-lg">22%</div><div className="text-emerald-100/80">Less waste</div></div>
            </div>
          </div>
        </div>
        <div className="relative w-full max-w-[280px] mt-8 space-y-2">
          <button
            onClick={() => go("dashboard")}
            className="w-full bg-white text-emerald-700 font-bold py-4 rounded-2xl text-lg active:scale-95 transition shadow-xl">
            Go to dashboard →
          </button>
          <button
            onClick={() => go("share")}
            className="w-full bg-white/10 text-white font-semibold py-3 rounded-2xl border border-white/30 text-sm active:scale-95 transition">
            Share the savings 🎉
          </button>
        </div>
      </div>
    );

    // ---------- DASHBOARD ----------
    const DashboardScreen = ({ go, mode, setMode, stats }) => {
      const modeConfig = {
        survival: { label: "Survival", color: "bg-emerald-600", emoji: "🛡️", desc: "Maximum saving" },
        balanced: { label: "Balanced", color: "bg-blue-600",    emoji: "⚖️", desc: "Smart defaults" },

        setScreen(s);
      };

      const renderScreen = () => {
        switch(screen) {
          case "welcome":     return <WelcomeScreen go={go} />;
          case "permissions": return <PermissionsScreen go={go} />;
          case "scanning":    return <ScanningScreen go={go} />;
          case "wow":         return <WowScreen go={go} />;
          case "fix":         return <FixScreen go={go} />;
          case "fixSuccess":  return <FixSuccessScreen go={go} />;
          case "dashboard":   return <DashboardScreen go={go} mode={mode} setMode={setMode} stats={stats} />;
          case "insights":    return <InsightsScreen go={go} />;
          case "weekly":      return <WeeklyScreen go={go} />;
          case "modes":       return <ModesScreen go={go} mode={mode} setMode={setMode} />;
          case "share":       return <ShareScreen go={go} />;
          default:            return <WelcomeScreen go={go} />;
        }
      };

      const labels = {
        welcome: "Welcome",
        permissions: "Permissions",
        scanning: "Scanning",
        wow: "Wow Moment",
        fix: "Fix Flow",
        fixSuccess: "Fix Success",
        dashboard: "Daily Dashboard",
        insights: "Insights & Forecast",
        weekly: "Weekly Report",
        modes: "Mode Selector",
        share: "Share / Referral",
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-6 gap-10">
          {/* Side panel — dev preview */}
          <div className="hidden lg:block w-80 flex-shrink-0">
            <div className="mb-6">
              <div className="flex items-center gap-2 mb-2">
                <div className="w-10 h-10 rounded-xl bg-emerald-500 text-white flex items-center justify-center font-black">DV</div>
                <div>
                  <div className="font-black text-slate-900 text-lg leading-tight">Data Vantage</div>
                  <div className="text-xs text-slate-500">Interactive prototype</div>
                </div>
              </div>
              <p className="text-sm text-slate-600 leading-snug">
                Tap any screen in the list to jump there. Or use the phone's buttons to walk through the real user journey.
              </p>
            </div>

            <div className="bg-white rounded-2xl p-3 border border-slate-200 shadow-sm">
              <div className="text-[10px] uppercase font-bold tracking-wider text-slate-500 mb-2 px-1">Journey</div>
              <div className="space-y-1">
                {SCREENS.map(s => (
                  <button
                    key={s}
                    onClick={() => jumpTo(s)}
                    className={`w-full flex items-center gap-2 px-3 py-2 rounded-xl text-left text-sm transition ${
                      screen === s
                        ? "bg-emerald-50 text-emerald-700 font-bold"
                        : "text-slate-600 hover:bg-slate-50"
                    }`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${screen === s ? "bg-emerald-500" : "bg-slate-300"}`}></span>
                    <span>{labels[s]}</span>
                  </button>
                ))}
              </div>
              <div className="h-px bg-slate-100 my-2"></div>
              <button
                onClick={reset}
                className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-left text-sm text-slate-500 hover:bg-slate-50">
                <span>↺</span> Restart flow
              </button>
            </div>

            <div className="mt-4 bg-slate-900 text-white rounded-2xl p-4 text-xs leading-relaxed">
              <div className="font-bold text-emerald-400 mb-1">Product thesis</div>
              <p className="text-slate-300">
                Browsers saved websites. Nobody has saved the <b className="text-white">whole phone</b> — apps, background, auto-downloads, video, sync. Data Vantage is an autopilot that eliminates waste invisibly.
              </p>
            </div>
          </div>

          {/* Phone */}
          <PhoneShell>
            {renderScreen()}
          </PhoneShell>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
